<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <div class="container">
        <header>
        <div class="heading">
            <i class="fa-solid fa-graduation-cap"></i><span>Student Management System</span>
        </div>
        <div class="welcome">
            welcome!
        </div>
    </header>
    <div class="main">
    
        <div class="navbar">
            <div class="nav-item">
                <a href="dashboard.html"><i class="fa-solid fa-house"></i>Dashboard</a>
            </div>
             <div class="nav-item">
                <a href="add.html"><i class="fa-solid fa-user-plus"></i>Add Students</a>
            </div>
             <div class="nav-item">
                <a href="view.html"><i class="fa-solid fa-user"></i> View Students</a>
            </div>
             <div class="nav-item">
                <a href="search.html"><i class="fa-solid fa-magnifying-glass"></i> Search Student</a>
            </div>
             <div class="nav-item">
                <a href="logout.html"><i class="fa-solid fa-arrow-right-from-bracket"></i>Logout</a>
            </div>
        
        </div>
        <div class="dashboard">
            <div class="sub-dashboard">
                <h1>Add New Student</h1>
            <form id="studentForm">
                <div class="grid">
                        <label>Full Name<br>
                            <input type="text" id="name" placeholder="Enter Full Name">
                        </label>
                        
                      <label>Roll Number<br>
                        <input type="number" id="roll" placeholder="Enter Roll no">
                      </label>
                          
                      <label>Email<br>
                        <input type="email" id="email" placeholder="Enter Email">
                      </label>
                            
                      <label>Course<br>
                        <input type="text" id="course" placeholder="Enter Course">
                      </label>
                            
                      <label>Department<br>
                        <input type="text" id="department" placeholder="Enter Department Name">
                      </label>
                            
                      <label> Phone Number<br>
                        <input type="number" id="phone" placeholder="Enter Phone Number">
                      </label>                          
                </div>
                <label>Address<br>
                        <textarea rows="4"  id="address" placeholder="Enter message"></textarea>
                      </label> 
                <div class="submitbtn">
                    <button type="reset">Reset</button>
                    <button type="submit" class="btn">Save Student</button>
                </div>
            </form>
            </div>
        </div>
    </div>
    </div>
    <script>
document.getElementById("studentForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let student = {
        name: document.getElementById("name").value,
        roll: document.getElementById("roll").value,
        email: document.getElementById("email").value,
        course: document.getElementById("course").value,
        department: document.getElementById("department").value,
        phone: document.getElementById("phone").value,
        address: document.getElementById("address").value
    };

    let students = JSON.parse(localStorage.getItem("students")) || [];

    students.push(student);

    localStorage.setItem("students", JSON.stringify(students));

    alert("Student Added Successfully!");

    window.location.href = "view.html";
});
</script>
</body>
</html>

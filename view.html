
<!DOCTYPE html>
<html lang="en">
<head>
    <title>View Students</title>
     <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
<header>
        <div class="heading">
            <i class="fa-solid fa-graduation-cap"></i><span>Student Management System</span>
        </div>
        <div class="welcome">
            welcome!
        </div>
    </header>
    <div class="main">
    
        <div class="navbar">
            <div class="nav-item">
                <a href="dashboard.html"><i class="fa-solid fa-house"></i>Dashboard</a>
            </div>
             <div class="nav-item">
                <a href="add.html"><i class="fa-solid fa-user-plus"></i>Add Students</a>
            </div>
             <div class="nav-item">
                <a href="view.html"><i class="fa-solid fa-user"></i> View Students</a>
            </div>
             <div class="nav-item">
                <a href="search.html"><i class="fa-solid fa-magnifying-glass"></i> Search Student</a>
            </div>
             <div class="nav-item">
                <a href="logout.html"><i class="fa-solid fa-arrow-right-from-bracket"></i>Logout</a>
            </div>
        
        </div>
        <div class="viewcontent">
            <div class="viewstudent">
                <h1>View All Students</h1>
                <button class="btn"><a href="add.html"><i class="fa-solid fa-user-plus"></i>Add Student</a></button>
            </div>
        <div class="viewdata">
    <table border="1">
  <thead>
    <tr>
      <th>ID</th>
      <th>Roll No</th>
      <th>Name</th>
      <th>Email</th>
      <th>Course</th>
      <th>Department</th>
      <th>Phone</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="studentTable"></tbody>
</table>
        </div>
        </div>
        

</div>
<script>
let students = JSON.parse(localStorage.getItem("students")) || [];
let table = document.getElementById("studentTable");

students.forEach((student,index)=>{
 table.innerHTML += `
 <tr>
   <td>${index+1}</td>
   <td>${student.roll}</td>
   <td>${student.name}</td>
   <td>${student.email}</td>
   <td>${student.course}</td>
   <td>${student.department}</td>
   <td>${student.phone}</td>
   <td>
      <button class="editbtn" onclick="editStudent(${index})">Edit</button>
      <button class="deletebtn" onclick="deleteStudent(${index})">Delete</button>
   </td>
 </tr>`;
});

function deleteStudent(index){
 let students = JSON.parse(localStorage.getItem("students"));
 if(confirm("Are you sure you want to delete?")){
   students.splice(index,1);
   localStorage.setItem("students",JSON.stringify(students));
   location.reload();
 }
}

function editStudent(index){
 localStorage.setItem("editIndex",index);
 window.location.href="edit.html";
}
</script>
</body>
</html>
